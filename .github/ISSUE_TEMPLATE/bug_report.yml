name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows 10
        - Windows 11
        - Linux
        - macOS (Apple Silicon)
        - macOS (Intel)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - bridge
        - assets
        - build system
        - unsure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: fa-content version/commit, fighters-legacy version, FA install edition
      placeholder: |
        fa-content: commit abc1234
        fighters-legacy: v0.x.x
        FA edition: Gold / Standard
        OS: Ubuntu 24.04 / Windows 11
        Compiler: GCC 14 / MSVC 2022
